# ═══════════════════════════════════════
#  BookMate — Application Configuration
# ═══════════════════════════════════════

server.port=8080

# ── Database (H2 in-memory for development) ──
spring.datasource.url=jdbc:h2:mem:bookmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL Production (uncomment to use) ──
# spring.datasource.url=jdbc:mysql://localhost:3306/bookmate?useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── JWT ──
bookmate.jwt.secret=BookMate_SuperSecret_JWT_Key_2024_PleaseChange_In_Production_32chars
bookmate.jwt.expiration-ms=86400000

# ── File Uploads ──
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
bookmate.upload.dir=./uploads

# ── CORS ──
bookmate.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500

# ── OpenAI (optional — leave as 'demo' for demo mode) ──
bookmate.openai.api-key=demo
bookmate.openai.base-url=https://api.openai.com/v1

# ── Actuator ──
management.endpoints.web.exposure.include=health,info
